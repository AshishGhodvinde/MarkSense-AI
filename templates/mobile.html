<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarkSense AI Mobile | Capture Interface</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Mobile-specifically optimized ultra-light CSS */
        .mobile-container {
            max-width: 100%;
            width: 100%;
            margin: 0 auto;
            padding: 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .mobile-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-top: 2rem;
        }
        
        /* Removing all GPU intensive backdrop-filters */
        .mobile-card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
        
        .card-title {
            margin-top: 0;
            color: #0f172a;
            font-size: 1.25rem;
            margin-bottom: 1rem;
        }
        
        .btn-capture {
            background: #0284c7;
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            display: block;
            width: 100%;
            text-align: center;
        }
        
        .laptop-ip-input {
            width: 100%;
            padding: 1rem;
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            color: #334155;
            box-sizing: border-box;
        }
        
        .upload-status {
            text-align: center;
            padding: 1rem;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 1rem;
        }
        
        .status-ready { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .status-uploading { background: #fef9c3; color: #854d0e; border: 1px solid #fef08a; }
        .status-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        
        /* Minimal Header Style */
        .simple-logo {
            font-size: 2rem;
            font-weight: 800;
            color: #0284c7;
            margin: 0 0 0.5rem 0;
        }
        .simple-desc {
            color: #64748b;
            margin: 0;
            font-size: 0.95rem;
        }
    </style>
</head>
<body style="background: #f8fafc; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <div class="mobile-container">
        <!-- Lightweight Header -->
        <header class="mobile-header">
            <h1 class="simple-logo">MarkSense AI</h1>
            <p class="simple-desc">Ultra-Lite Mobile Capture</p>
        </header>

        <!-- Roll Number Input -->
        <div class="mobile-card">
            <h3 class="card-title">📝 Targeted Roll Number</h3>
            <input type="text" id="rollNumberInput" class="laptop-ip-input" placeholder="Scanned from laptop" readonly style="background: #f1f5f9; cursor: not-allowed; font-weight: bold;">
        </div>

        <!-- Camera Capture -->
        <div class="mobile-card">
            <h3 class="card-title">📸 Capture Marksheet</h3>
            
            <div class="file-input-wrapper" style="margin-bottom: 1rem;">
                <input type="file" id="directFileInput" accept="image/*" capture="environment" style="display: none;">
                <button type="button" class="btn-capture" style="width: 100%; justify-content: center;" onclick="document.getElementById('directFileInput').click()">
                    📸 Open Camera
                </button>
                <small style="color: var(--text-muted); display: block; margin-top: 0.5rem; text-align: center;">
                    Image will be sent automatically
                </small>
            </div>
            
            <!-- Upload Status -->
            <div id="uploadStatus" class="upload-status status-ready hidden" style="display: none;">
                Ready...
            </div>
        </div>
    </div>

    <script>
        // DOM elements
        const rollNumberInput = document.getElementById('rollNumberInput');
        const directFileInput = document.getElementById('directFileInput');
        const uploadStatus = document.getElementById('uploadStatus');
        
        // Auto-fill roll number from URL
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const roll = urlParams.get('roll');
            if (roll) {
                rollNumberInput.value = roll;
            } else {
                updateStatus('Missed Roll Number! Scan QR code again.', 'error');
                directFileInput.disabled = true;
            }
            
            // Cleanup memory aggressive on load
            if (window.gc) window.gc();
        });

        function updateStatus(message, type) {
            uploadStatus.style.display = 'block';
            uploadStatus.textContent = message;
            uploadStatus.className = `upload-status status-${type}`;
            if (type === 'uploading') {
                uploadStatus.innerHTML = `<svg class="modern-spinner" viewBox="0 0 50 50" style="width: 20px; height: 20px; vertical-align: middle; margin-right: 10px; animation: rotate 2s linear infinite;"><circle cx="25" cy="25" r="15" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-dasharray="1, 200" stroke-dashoffset="0" style="animation: dash 1.5s ease-in-out infinite;"></circle></svg> ${message}`;
            }
        }

        // Direct file handler - AUTO SUBMIT on change
        async function handleDirectFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // To prevent memory crash on iOS Safari / old Android, we upload immediately 
            // without rendering to canvas or loading as base64 string.
            updateStatus('Uploading directly...', 'uploading');
            
            const rollNumber = rollNumberInput.value.trim();
            if (!rollNumber) {
                updateStatus('Missing Roll Number!', 'error');
                return;
            }

            try {
                const formData = new FormData();
                formData.append('file', file, file.name);
                formData.append('roll_number', rollNumber);

                // Upload via relative URL
                const response = await fetch(`/api/mobile_upload`, {
                    method: 'POST',
                    headers: { 'Bypass-Tunnel-Reminder': 'true' },
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    updateStatus('✅ Image uploaded! Look at laptop screen.', 'status-ready');
                    // Clear the file input immediately
                    directFileInput.value = '';
                } else {
                    updateStatus(`❌ Server Error: ${result.error}`, 'error');
                }
            } catch (error) {
                updateStatus('❌ Connection failed. Please try again.', 'error');
            }
            
            // Aggressive garbage collection queue
            if (window.gc) setTimeout(() => window.gc(), 100);
        }

        directFileInput.addEventListener('change', handleDirectFile);

        // Memory pressure handling
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && directFileInput.files.length === 0) {
                // Backgrounded but not currently uploading - clear memory just in case
                if (window.gc) window.gc();
            }
        });
    </script>
</body>
</html>
